<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cartón de Bingo</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #2563eb; --marked: #16a34a; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .join-box { background: var(--card); padding: 20px; border-radius: 10px; width: 100%; max-width: 360px; text-align: center; }
        input, select, button { width: 100%; padding: 10px; margin-top: 10px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; text-transform: uppercase; }
        button { background: var(--accent); border: none; font-weight: bold; cursor: pointer; text-transform: none; }
        
        .last-ball-bar { background: #334155; width: 100%; max-width: 360px; text-align: center; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; }
        .last-ball-num { font-size: 1.8rem; color: #60a5fa; margin-left: 8px; }

        .cards-container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; width: 100%; }
        .bingo-card { background: var(--card); padding: 15px; border-radius: 12px; width: 320px; }
        .card-header { display: grid; grid-template-columns: repeat(5, 1fr); text-align: center; font-weight: bold; color: #f59e0b; margin-bottom: 8px; font-size: 1.2rem; }
        .card-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #334155; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .cell.marked { background: var(--marked); box-shadow: 0 0 8px rgba(22, 163, 74, 0.8); }
        .cell.free { background: #d97706; font-size: 0.8rem; }
        .bingo-btn { background: #dc2626; margin-top: 12px; padding: 12px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <h1 style="color:#60a5fa; margin-bottom: 15px;">🎟️ Bingo En Vivo</h1>

    <div class="last-ball-bar">
        ÚLTIMA BALOTA: <span class="last-ball-num" id="lastBallDisplay">--</span>
    </div>

    <div class="join-box" id="joinBox">
        <input type="text" id="roomCode" placeholder="CÓDIGO DE SALA (EJ: X7K9P2)">
        <input type="text" id="username" placeholder="Tu Nombre o @usuario_tiktok" style="text-transform: none;">
        <select id="cardsCount" style="text-transform: none;">
            <option value="1">1 Cartón</option>
            <option value="2">2 Cartones</option>
            <option value="3">3 Cartones</option>
        </select>
        <button onclick="joinGame()">Entrar a Jugar</button>
    </div>

    <div class="cards-container" id="cardsContainer"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myCards = [];

        socket.on('gameStateUpdate', (state) => {
            if (state.lastDrawnNumber) {
                document.getElementById('lastBallDisplay').innerText = state.lastDrawnNumber;
            }
        });

        socket.on('numberDrawn', ({ number }) => {
            document.getElementById('lastBallDisplay').innerText = number;
        });

        socket.on('bingoRejected', ({ reason }) => {
            alert(`⚠️ BINGO NO VÁLIDO: ${reason}`);
        });

        socket.on('bingoWinner', ({ username, cardIndex, patterns }) => {
            alert(`🎉 ¡BINGO CONFIRMADO! ${username} ha ganado (Cartón #${cardIndex + 1}) con: ${patterns.join(', ')}`);
        });

        socket.on('gameReset', () => {
            document.getElementById('cardsContainer').innerHTML = '';
            document.getElementById('joinBox').style.display = 'block';
            document.getElementById('lastBallDisplay').innerText = '--';
            alert('La sala se ha cerrado o reiniciado. Ingresa el nuevo código para volver a jugar.');
        });

        function joinGame() {
            const roomCode = document.getElementById('roomCode').value.trim();
            const username = document.getElementById('username').value.trim();
            const cardsCount = document.getElementById('cardsCount').value;

            if (!roomCode || !username) {
                return alert('Por favor ingresa el código de sala y tu nombre.');
            }

            socket.emit('joinGame', { roomCode, username, cardsCount }, (res) => {
                if (res.success) {
                    myCards = res.cards;
                    document.getElementById('joinBox').style.display = 'none';
                    renderCards();
                } else {
                    alert(res.message);
                }
            });
        }

        function renderCards() {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';

            myCards.forEach((card, cardIndex) => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'bingo-card';
                let html = `<div class="card-header"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div><div class="card-grid">`;

                for (let row = 0; row < 5; row++) {
                    for (let col = 0; col < 5; col++) {
                        const val = card[row][col];
                        const isFree = val === 'FREE';
                        html += `<div class="${isFree ? 'cell free marked' : 'cell'}" onclick="toggleMark(this)">${val}</div>`;
                    }
                }

                html += `</div><button class="bingo-btn" onclick="claimBingo(${cardIndex})">📢 ¡CANTAR BINGO!</button>`;
                cardDiv.innerHTML = html;
                container.appendChild(cardDiv);
            });
        }

        function toggleMark(cell) {
            if (!cell.classList.contains('free')) {
                cell.classList.toggle('marked');
            }
        }

        function claimBingo(cardIndex) {
            socket.emit('claimBingo', { cardIndex });
        }
    </script>
</body>
</html>
