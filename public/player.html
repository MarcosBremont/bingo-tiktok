<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cartón de Bingo</title>
    <style>
        :root { --bg: #0f172a; --card-bg: #1e293b; --accent: #2563eb; --marked: #16a34a; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        h1 { margin-bottom: 10px; color: #60a5fa; }
        .join-box { background: var(--card-bg); padding: 20px; border-radius: 10px; width: 100%; max-width: 400px; text-align: center; }
        input, select, button { width: 100%; padding: 10px; margin-top: 10px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; }
        button { background: var(--accent); border: none; font-weight: bold; cursor: pointer; }
        .cards-container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; width: 100%; margin-top: 20px; }
        .bingo-card { background: var(--card-bg); padding: 15px; border-radius: 12px; width: 320px; }
        .card-header { display: grid; grid-template-columns: repeat(5, 1fr); text-align: center; font-weight: bold; color: #f59e0b; margin-bottom: 8px; }
        .card-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #334155; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .cell.marked { background: var(--marked); box-shadow: 0 0 8px rgba(22, 163, 74, 0.8); }
        .cell.free { background: #d97706; font-size: 0.8rem; }
        .bingo-btn { background: #dc2626; margin-top: 12px; padding: 12px; }
    </style>
</head>
<body>

    <h1>🎟️ Mi Cartón de Bingo</h1>

    <div class="join-box" id="joinBox">
        <input type="text" id="username" placeholder="Tu Nombre o @usuario_tiktok">
        <select id="cardsCount">
            <option value="1">1 Cartón</option>
            <option value="2">2 Cartones</option>
            <option value="3">3 Cartones</option>
        </select>
        <button onclick="joinGame()">Entrar a la Partida</button>
    </div>

    <div class="cards-container" id="cardsContainer"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myCards = [];

        function joinGame() {
            const username = document.getElementById('username').value.trim();
            const cardsCount = document.getElementById('cardsCount').value;
            if (username) {
                socket.emit('joinGame', { username, cardsCount });
                document.getElementById('joinBox').style.display = 'none';
            }
        }

        socket.on('yourCards', (cards) => { myCards = cards; renderCards(); });
        socket.on('bingoRejected', ({ reason }) => { alert(`⚠️ BINGO NO VÁLIDO: ${reason}`); });
        socket.on('bingoWinner', ({ username, cardIndex, patterns }) => {
            alert(`🎉 ¡BINGO CONFIRMADO! ${username} ha ganado (Cartón #${cardIndex + 1}) con: ${patterns.join(', ')}`);
        });
        socket.on('gameReset', () => {
            document.getElementById('cardsContainer').innerHTML = '';
            document.getElementById('joinBox').style.display = 'block';
        });

        function renderCards() {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';
            myCards.forEach((card, cardIndex) => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'bingo-card';
                let html = `<div class="card-header"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div><div class="card-grid">`;
                for (let row = 0; row < 5; row++) {
                    for (let col = 0; col < 5; col++) {
                        const val = card[row][col];
                        const isFree = val === 'FREE';
                        html += `<div class="${isFree ? 'cell free marked' : 'cell'}" onclick="toggleMark(this)">${val}</div>`;
                    }
                }
                html += `</div><button class="bingo-btn" onclick="claimBingo(${cardIndex})">📢 ¡CANTAR BINGO!</button>`;
                cardDiv.innerHTML = html;
                container.appendChild(cardDiv);
            });
        }

        function toggleMark(cell) {
            if (!cell.classList.contains('free')) cell.classList.toggle('marked');
        }

        function claimBingo(cardIndex) {
            socket.emit('claimBingo', { cardIndex });
        }
    </script>
</body>
</html>
