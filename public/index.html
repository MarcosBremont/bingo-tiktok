<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anfitrión - Bingo TikTok</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #ff0050; --cyan: #00f2fe; --text: #fff;
        }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .box { background: var(--card); padding: 25px; border-radius: 12px; text-align: center; width: 95%; max-width: 1200px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .room-code { font-size: 3rem; font-weight: bold; color: var(--cyan); letter-spacing: 4px; margin: 5px 0; }
        .ball { font-size: 3.5rem; font-weight: bold; color: var(--accent); border: 4px dashed var(--accent); border-radius: 50%; width: 110px; height: 110px; display: flex; align-items: center; justify-content: center; margin: 15px auto; }
        
        input[type="password"] { padding: 10px; border-radius: 8px; font-size: 1rem; width: 80%; margin-bottom: 15px; border: none; background: #334155; color: white; text-align: center; }
        
        button { background: linear-gradient(45deg, var(--accent), var(--cyan)); border: none; color: white; padding: 12px 24px; font-size: 1.1rem; font-weight: bold; border-radius: 30px; cursor: pointer; transition: transform 0.2s; margin: 5px; }
        button:hover { transform: scale(1.05); }
        .btn-reset { background: #ef4444; }
        
        .history { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; justify-content: center; max-height: 100px; overflow-y: auto; }
        .badge { background: #334155; padding: 4px 8px; border-radius: 12px; font-size: 0.9rem; }
        
        .players-section { background: #0f172a; padding: 12px; border-radius: 10px; margin: 15px 0; }
        .players-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
        .player-chip { background: var(--cyan); color: #000; font-weight: bold; padding: 5px 12px; border-radius: 15px; font-size: 0.9rem; }

        .card-container { display: flex; flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; width: 100%; }
        .single-card-box { background: #0f172a; padding: 12px; border-radius: 10px; flex: 1 1 300px; max-width: 340px; }
        .card-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 8px; }
        .cell-head { font-weight: bold; color: var(--cyan); padding: 4px 0; font-size: 1rem; }
        .cell { background: #334155; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 5px; user-select: none; font-size: 1rem; cursor: pointer; }
        .cell.free { background: var(--accent); font-size: 0.7rem; }
        .cell.marked { background: #22c55e !important; color: white; }

        #alertBox { display: none; background: #22c55e; color: black; font-weight: bold; padding: 15px; border-radius: 8px; font-size: 1.3rem; margin-bottom: 15px; width: 90%; max-width: 1100px; text-align: center; }
    </style>
</head>
<body>

    <div id="alertBox"></div>

    <div class="box" style="max-width: 450px;" id="setupBox">
        <h1>🎱 Panel Anfitrión</h1>
        
        <input type="password" id="hostPassword" placeholder="Clave de Anfitrión">

        <label style="display:block; margin-bottom: 10px;">
            <input type="checkbox" id="hostPlay" onchange="toggleHostOptions()"> ¿Quieres jugar con cartones como anfitrión?
        </label>
        
        <div id="hostCardOptions" style="display:none; margin-bottom: 15px;">
            <label>Cantidad de cartones: </label>
            <select id="hostCardCount" style="padding: 8px; border-radius: 6px; background: #334155; color: white;">
                <option value="1">1 Cartón</option>
                <option value="2">2 Cartones</option>
                <option value="3">3 Cartones</option>
            </select>
        </div>

        <button onclick="createRoom()">Crear Nueva Sala</button>
    </div>

    <div class="box" id="gamePanel" style="display:none;">
        <p>Código de la sala para seguidores:</p>
        <div class="room-code" id="displayRoom">----</div>
        
        <div class="players-section">
            <div>Jugadores conectados: <b id="playerCount" style="color:var(--cyan)">0</b></div>
            <div class="players-list" id="playersList"></div>
        </div>
        
        <div class="ball" id="currentBall">--</div>
        <div>
            <button onclick="drawBall()">Sacar Balota</button>
            <button class="btn-reset" onclick="resetGame()">Reiniciar Juego 🔄</button>
        </div>

        <h3>Historial de Balotas</h3>
        <div class="history" id="history"></div>

        <div class="card-container" id="hostCardsContainer"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentRoomId = null;

        function toggleHostOptions() {
            const isChecked = document.getElementById('hostPlay').checked;
            document.getElementById('hostCardOptions').style.display = isChecked ? 'block' : 'none';
        }

        function createRoom() {
            const password = document.getElementById('hostPassword').value.trim();
            const hostPlay = document.getElementById('hostPlay').checked;
            const cardCount = document.getElementById('hostCardCount').value;

            if (!password) return alert('Debes ingresar la clave de anfitrión.');

            socket.emit('createRoom', { password, hostPlay, cardCount });
        }

        socket.on('roomCreated', ({ roomId, cards }) => {
            currentRoomId = roomId;
            document.getElementById('setupBox').style.display = 'none';
            document.getElementById('gamePanel').style.display = 'block';
            document.getElementById('displayRoom').innerText = roomId;

            if (cards && cards.length > 0) renderHostCards(cards);
        });

        function renderHostCards(cards) {
            const container = document.getElementById('hostCardsContainer');
            container.innerHTML = '';

            cards.forEach((card, index) => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'single-card-box';
                cardDiv.innerHTML = `<div style="color:var(--cyan); font-weight:bold; margin-bottom:5px;">Cartón #${index + 1}</div>`;
                
                const grid = document.createElement('div');
                grid.className = 'card-grid';
                grid.innerHTML = '<div class="cell-head">B</div><div class="cell-head">I</div><div class="cell-head">N</div><div class="cell-head">G</div><div class="cell-head">O</div>';

                for (let r = 0; r < 5; r++) {
                    for (let c = 0; c < 5; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        const val = card[r][c];

                        if (val === 'LIBRE') {
                            cell.classList.add('free', 'marked');
                            cell.innerText = '★ LIBRE';
                        } else {
                            cell.innerText = val;
                            cell.onclick = () => cell.classList.toggle('marked');
                        }
                        grid.appendChild(cell);
                    }
                }

                const btnBingo = document.createElement('button');
                btnBingo.style.cssText = 'background: #22c55e; margin-top: 15px; font-size: 1.1rem; padding: 10px; width: 100%;';
                btnBingo.innerText = ` ¡BINGO (Cartón #${index + 1})! 🎉`;
                btnBingo.onclick = () => {
                    socket.emit('claimBingo', { roomId: currentRoomId, username: 'Anfitrión (Tú)', cardIndex: index });
                };

                cardDiv.appendChild(grid);
                cardDiv.appendChild(btnBingo);
                container.appendChild(cardDiv);
            });
        }

        function drawBall() {
            if (currentRoomId) socket.emit('drawBall', { roomId: currentRoomId });
        }

        function resetGame() {
            if (confirm("¿Estás seguro de reiniciar la partida? Se limpiará la tómbola y se entregarán nuevos cartones.")) {
                socket.emit('resetGame', { roomId: currentRoomId });
            }
        }

        socket.on('newBall', ({ ball, history }) => {
            let letter = ball <= 15 ? 'B' : ball <= 30 ? 'I' : ball <= 45 ? 'N' : ball <= 60 ? 'G' : 'O';
            document.getElementById('currentBall').innerText = `${letter}${ball}`;

            const historyDiv = document.getElementById('history');
            historyDiv.innerHTML = history.map(n => {
                let l = n <= 15 ? 'B' : n <= 30 ? 'I' : n <= 45 ? 'N' : n <= 60 ? 'G' : 'O';
                return `<span class="badge">${l}${n}</span>`;
            }).reverse().join('');
        });

        socket.on('updatePlayersList', ({ players }) => {
            document.getElementById('playerCount').innerText = players.length;
            const listDiv = document.getElementById('playersList');
            listDiv.innerHTML = players.map(p => `<span class="player-chip">${p}</span>`).join('');
        });

        socket.on('bingoClaimed', ({ username, cardIndex }) => {
            const alert = document.getElementById('alertBox');
            alert.innerText = ` ¡${username} HA CANTADO BINGO EN EL CARTÓN #${cardIndex + 1}! `;
            alert.style.display = 'block';
        });

        socket.on('gameResetHost', ({ cards }) => {
            document.getElementById('alertBox').style.display = 'none';
            document.getElementById('currentBall').innerText = '--';
            document.getElementById('history').innerHTML = '';
            if (cards && cards.length > 0) renderHostCards(cards);
        });

        socket.on('errorMsg', (msg) => alert(msg));
    </script>
</body>
</html>
