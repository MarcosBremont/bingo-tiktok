<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anfitrión - Bingo TikTok Live</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #ff0050; --cyan: #00f2fe; --text: #fff;
        }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 95vh; justify-content: space-between; }
        
        .box { background: var(--card); padding: 25px; border-radius: 12px; text-align: center; width: 95%; max-width: 1200px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); margin-bottom: 20px; }
        .room-code { font-size: 3rem; font-weight: bold; color: var(--cyan); letter-spacing: 4px; margin: 5px 0; }
        .ball { font-size: 3.5rem; font-weight: bold; color: var(--accent); border: 4px dashed var(--accent); border-radius: 50%; width: 110px; height: 110px; display: flex; align-items: center; justify-content: center; margin: 15px auto; }
        
        input, select { padding: 10px; border-radius: 8px; font-size: 1rem; border: 2px solid #334155; background: #0f172a; color: white; text-align: center; }
        button { background: linear-gradient(45deg, var(--accent), var(--cyan)); border: none; color: white; padding: 12px 24px; font-size: 1.1rem; font-weight: bold; border-radius: 30px; cursor: pointer; transition: transform 0.2s; margin: 5px; }
        button:hover { transform: scale(1.05); }
        .btn-reset { background: #ef4444; }
        
        .history { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; justify-content: center; max-height: 100px; overflow-y: auto; }
        .badge { background: #334155; padding: 4px 8px; border-radius: 12px; font-size: 0.9rem; }
        
        .players-section { background: #0f172a; padding: 12px; border-radius: 10px; margin: 15px 0; }
        .players-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
        .player-chip { background: var(--cyan); color: #000; font-weight: bold; padding: 5px 12px; border-radius: 15px; font-size: 0.9rem; }

        .card-container { display: flex; flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; width: 100%; }
        .single-card-box { background: #0f172a; padding: 12px; border-radius: 10px; flex: 1 1 300px; max-width: 340px; }
        .card-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 8px; }
        .cell-head { font-weight: bold; color: var(--cyan); padding: 4px 0; font-size: 1rem; }
        .cell { background: #334155; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 5px; user-select: none; font-size: 1rem; cursor: pointer; }
        .cell.free { background: var(--accent); font-size: 0.7rem; }
        .cell.marked { background: #22c55e !important; color: white; }
        
        .cell.valid-match { background: #22c55e !important; color: white; border: 2px solid #fff; font-weight: bold; }
        .cell.bad-match { background: #ef4444 !important; color: white; border: 2px solid #ff9999; font-weight: bold; }

        #alertBox { display: none; background: #1e293b; color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; width: 95%; max-width: 480px; text-align: center; border: 3px solid #22c55e; box-shadow: 0 0 25px rgba(34, 197, 94, 0.4); }
        #alertBox.has-error { border-color: #ef4444; box-shadow: 0 0 25px rgba(239, 68, 68, 0.4); }
        #alertBox h2 { color: #22c55e; margin-top: 0; }
        #alertBox.has-error h2 { color: #ef4444; }
        .legend { display: flex; justify-content: center; gap: 15px; font-size: 0.8rem; margin: 10px 0; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .dot { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
        .verify-card { max-width: 320px; margin: 10px auto; }
        .close-alert-btn { background: #ef4444; margin-top: 15px; padding: 8px 18px; font-size: 0.9rem; }

        footer { margin-top: 25px; font-size: 0.95rem; color: #94a3b8; text-align: center; }
        footer b { color: var(--cyan); letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <!-- Ventana Modal de Verificación de Bingo -->
    <div id="alertBox">
        <h2 id="alertTitle">🎉 ¡ALGUIEN CANTÓ BINGO!</h2>
        <div id="alertSubtitle" style="font-size: 1.1rem; margin-bottom: 5px;"></div>
        
        <div class="legend">
            <div class="legend-item"><span class="dot" style="background:#22c55e;"></span> Válido</div>
            <div class="legend-item"><span class="dot" style="background:#ef4444;"></span> Incorrecto (No salió)</div>
        </div>

        <div id="verifyCardContainer" class="verify-card"></div>
        <button class="close-alert-btn" onclick="document.getElementById('alertBox').style.display='none'">Cerrar Verificación ❌</button>
    </div>

    <!-- Panel Inicial de Configuración -->
    <div class="box" style="max-width: 450px;" id="setupBox">
        <h1>🎱 Panel Anfitrión</h1>
        <input type="password" id="hostPassword" placeholder="Clave de Anfitrión" autocomplete="off" style="width:80%; margin-bottom:15px;"><br>

        <label style="display:block; margin-bottom: 10px;">
            <input type="checkbox" id="hostPlay" onchange="toggleHostOptions()"> ¿Quieres jugar con cartones como anfitrión?
        </label>
        
        <div id="hostCardOptions" style="display:none; margin-bottom: 15px;">
            <label>Cantidad de cartones: </label>
            <select id="hostCardCount">
                <option value="1">1 Cartón</option>
                <option value="2">2 Cartones</option>
                <option value="3">3 Cartones</option>
            </select>
        </div>

        <button onclick="createRoom()">Crear Nueva Sala</button>
    </div>

    <!-- Panel de Juego Principal -->
    <div class="box" id="gamePanel" style="display:none;">
        <p style="margin:0;">Código de Sala:</p>
        <div class="room-code" id="displayRoom">----</div>
        
        <!-- Opciones de Partida y TikTok Live -->
        <div style="background:#0f172a; padding:15px; border-radius:10px; margin:15px 0;">
            <div style="display:flex; justify-content:space-around; align-items:center; flex-wrap:wrap; gap:10px;">
                <div>
                    <label>Modo de Victoria: </label>
                    <select id="patternSelect" onchange="updatePattern()">
                        <option value="FULL">Cartón Lleno (Blackout)</option>
                        <option value="LINE">Línea Horizontal/Vertical</option>
                        <option value="CORNER">4 Esquinas</option>
                    </select>
                </div>
                <div>
                    <input type="text" id="tiktokUser" placeholder="@usuario_tiktok" style="width:150px;">
                    <button onclick="connectTikTok()" style="padding:8px 15px; font-size:0.9rem;">Conectar Live</button>
                    <span id="tiktokStatus" style="font-size:0.85rem; font-weight:bold; display:block;"></span>
                </div>
            </div>
        </div>

        <div class="players-section">
            <div>Jugadores conectados: <b id="playerCount" style="color:var(--cyan)">0</b> | Balotas Restantes: <b id="ballsLeft" style="color:var(--cyan)">75</b></div>
            <div class="players-list" id="playersList"></div>
        </div>
        
        <div class="ball" id="currentBall">--</div>
        <div>
            <button onclick="drawBall()">Sacar Balota</button>
            <button class="btn-reset" onclick="resetGame()">Reiniciar Juego 🔄</button>
        </div>

        <h3>Historial de Balotas</h3>
        <div class="history" id="history"></div>

        <div style="margin-top:20px; background:#0f172a; padding:15px; border-radius:10px;">
            <h3>🏆 Historial de Ganadores</h3>
            <ul id="winnersList" style="list-style:none; padding:0; margin:0; text-align:center;"></ul>
        </div>

        <div class="card-container" id="hostCardsContainer"></div>
    </div>

    <footer>
        Desarrollado por <b>Marcos Bremont</b> &copy; 2026
    </footer>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentRoomId = null;

        // Cargar sonidos
        const audioClick = new Audio('/click.mp3');
        const audioBingo = new Audio('/bingo.mp3');
        const audioFail = new Audio('/gameover.mp3');

        function playSound(audio) {
            audio.currentTime = 0;
            audio.play().catch(e => console.log('Audio autoplay bloqueado por navegador:', e));
        }

        function toggleHostOptions() {
            const isChecked = document.getElementById('hostPlay').checked;
            document.getElementById('hostCardOptions').style.display = isChecked ? 'block' : 'none';
        }

        function createRoom() {
            const password = document.getElementById('hostPassword').value.trim();
            const hostPlay = document.getElementById('hostPlay').checked;
            const cardCount = document.getElementById('hostCardCount').value;

            if (!password) return alert('Debes ingresar la clave de anfitrión.');
            socket.emit('createRoom', { password, hostPlay, cardCount, gamePattern: document.getElementById('patternSelect').value });
        }

        socket.on('roomCreated', ({ roomId, cards }) => {
            currentRoomId = roomId;
            document.getElementById('setupBox').style.display = 'none';
            document.getElementById('gamePanel').style.display = 'block';
            document.getElementById('displayRoom').innerText = roomId;

            if (cards && cards.length > 0) renderHostCards(cards);
        });

        function updatePattern() {
            const pattern = document.getElementById('patternSelect').value;
            socket.emit('changePattern', { roomId: currentRoomId, pattern });
        }

        function connectTikTok() {
            const tiktokUsername = document.getElementById('tiktokUser').value.trim();
            if (!tiktokUsername) return alert('Ingresa tu usuario de TikTok');

            document.getElementById('tiktokStatus').style.color = '#00f2fe';
            document.getElementById('tiktokStatus').innerText = 'Conectando...';
            socket.emit('connectTikTok', { tiktokUsername, roomId: currentRoomId });
        }

        socket.on('tiktokConnected', ({ status, error }) => {
            const statusSpan = document.getElementById('tiktokStatus');
            if (status) {
                statusSpan.style.color = '#22c55e';
                statusSpan.innerText = '● Conectado a TikTok Live';
            } else {
                statusSpan.style.color = '#ef4444';
                statusSpan.innerText = '❌ Error al conectar';
            }
        });

        function renderHostCards(cards) {
            const container = document.getElementById('hostCardsContainer');
            container.innerHTML = '';

            cards.forEach((card, index) => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'single-card-box';
                cardDiv.id = `host-card-${index}`;
                cardDiv.innerHTML = `<div style="color:var(--cyan); font-weight:bold; margin-bottom:5px;">Cartón #${index + 1}</div>`;
                
                const grid = document.createElement('div');
                grid.className = 'card-grid';
                grid.innerHTML = '<div class="cell-head">B</div><div class="cell-head">I</div><div class="cell-head">N</div><div class="cell-head">G</div><div class="cell-head">O</div>';

                for (let r = 0; r < 5; r++) {
                    for (let c = 0; c < 5; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        const val = card[r][c];

                        if (val === 'LIBRE') {
                            cell.classList.add('free', 'marked');
                            cell.innerText = '★ LIBRE';
                        } else {
                            cell.innerText = val;
                            cell.onclick = () => cell.classList.toggle('marked');
                        }
                        grid.appendChild(cell);
                    }
                }

                const btnBingo = document.createElement('button');
                btnBingo.style.cssText = 'background: #22c55e; margin-top: 15px; font-size: 1.1rem; padding: 10px; width: 100%;';
                btnBingo.innerText = ` ¡BINGO (Cartón #${index + 1})! 🎉`;
                btnBingo.onclick = () => {
                    const marked = [];
                    cardDiv.querySelectorAll('.cell.marked').forEach(c => {
                        const text = c.innerText.replace('★ ', '');
                        if(text !== 'LIBRE') marked.push(parseInt(text));
                    });

                    socket.emit('claimBingo', { 
                        roomId: currentRoomId, 
                        username: 'Anfitrión (Tú)', 
                        cardIndex: index,
                        markedNumbers: marked
                    });
                };

                cardDiv.appendChild(grid);
                cardDiv.appendChild(btnBingo);
                container.appendChild(cardDiv);
            });
        }

        function drawBall() {
            if (currentRoomId) socket.emit('drawBall', { roomId: currentRoomId });
        }

        function resetGame() {
            if (confirm("¿Estás seguro de reiniciar la partida?")) {
                socket.emit('resetGame', { roomId: currentRoomId });
            }
        }

        socket.on('newBall', ({ ball, history, remaining }) => {
            playSound(audioClick);

            let letter = ball <= 15 ? 'B' : ball <= 30 ? 'I' : ball <= 45 ? 'N' : ball <= 60 ? 'G' : 'O';
            document.getElementById('currentBall').innerText = `${letter}${ball}`;
            document.getElementById('ballsLeft').innerText = remaining;

            const historyDiv = document.getElementById('history');
            historyDiv.innerHTML = history.map(n => {
                let l = n <= 15 ? 'B' : n <= 30 ? 'I' : n <= 45 ? 'N' : n <= 60 ? 'G' : 'O';
                return `<span class="badge">${l}${n}</span>`;
            }).reverse().join('');
        });

        socket.on('updatePlayersList', ({ players }) => {
            document.getElementById('playerCount').innerText = players.length;
            const listDiv = document.getElementById('playersList');
            listDiv.innerHTML = players.map(p => `<span class="player-chip">${p}</span>`).join('');
        });

        socket.on('updateWinners', ({ history }) => {
            const list = document.getElementById('winnersList');
            list.innerHTML = history.map(w => 
                `<li style="padding:4px 0; border-bottom:1px solid #334155;">
                    🏆 <b>${w.username}</b> - Modo: <span style="color:var(--cyan)">${w.pattern}</span> (${w.time})
                </li>`
            ).join('');
        });

        socket.on('bingoClaimed', ({ username, cardIndex, card, markedNumbers, drawnNumbers }) => {
            const alertBox = document.getElementById('alertBox');
            document.getElementById('alertTitle').innerText = `🎉 ¡${username.toUpperCase()} CANTÓ BINGO!`;
            document.getElementById('alertSubtitle').innerText = `Verificando Cartón #${cardIndex + 1}:`;

            const container = document.getElementById('verifyCardContainer');
            container.innerHTML = '';

            const grid = document.createElement('div');
            grid.className = 'card-grid';
            grid.innerHTML = '<div class="cell-head">B</div><div class="cell-head">I</div><div class="cell-head">N</div><div class="cell-head">G</div><div class="cell-head">O</div>';

            let hasErrors = false;

            for (let r = 0; r < 5; r++) {
                for (let c = 0; c < 5; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    const val = card[r][c];

                    if (val === 'LIBRE') {
                        cell.classList.add('free', 'valid-match');
                        cell.innerText = '★ LIBRE';
                    } else {
                        cell.innerText = val;
                        const isMarked = markedNumbers.includes(val);
                        const isDrawn = drawnNumbers.includes(val);

                        if (isMarked && isDrawn) {
                            cell.classList.add('valid-match'); 
                        } else if (isMarked && !isDrawn) {
                            cell.classList.add('bad-match');   
                            hasErrors = true;
                        }
                    }
                    grid.appendChild(cell);
                }
            }

            if (hasErrors) {
                alertBox.classList.add('has-error');
                playSound(audioFail);
            } else {
                alertBox.classList.remove('has-error');
                playSound(audioBingo);
            }

            container.appendChild(grid);
            alertBox.style.display = 'block';
        });

        socket.on('gameResetHost', ({ cards }) => {
            document.getElementById('alertBox').style.display = 'none';
            document.getElementById('currentBall').innerText = '--';
            document.getElementById('history').innerHTML = '';
            document.getElementById('ballsLeft').innerText = '75';
            if (cards && cards.length > 0) renderHostCards(cards);
        });

        socket.on('errorMsg', (msg) => alert(msg));
    </script>
</body>
</html>
