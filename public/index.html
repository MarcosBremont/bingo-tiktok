<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo TikTok Live - Panel Host</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --text: #f8fafc;
            --subtext: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text); padding: 20px; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: #60a5fa; font-size: 2rem; }

        .grid-container {
            display: grid;
            grid-template-columns: 320px 1fr 300px;
            gap: 20px;
        }

        @media (max-width: 1024px) { .grid-container { grid-template-columns: 1fr; } }

        .panel {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .panel h2 {
            font-size: 1.2rem; margin-bottom: 15px; border-bottom: 2px solid #334155; padding-bottom: 8px; color: #93c5fd;
        }

        .checkbox-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .checkbox-group label {
            display: flex; align-items: center; gap: 10px; font-size: 0.95rem; cursor: pointer; background: #334155; padding: 8px 12px; border-radius: 6px;
        }

        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .btn-primary { background-color: var(--accent); color: white; }
        .btn-success { background-color: var(--success); color: white; }
        .btn-danger { background-color: var(--danger); color: white; }

        input[type="text"], input[type="number"] {
            width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; margin-bottom: 10px;
        }

        .board-grid { display: grid; grid-template-columns: repeat(15, 1fr); gap: 6px; margin-top: 15px; }
        .ball-cell {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #0f172a; border-radius: 6px; font-weight: bold; color: var(--subtext); border: 1px solid #334155;
        }
        .ball-cell.drawn { background: var(--accent); color: white; border-color: #60a5fa; box-shadow: 0 0 8px rgba(37, 99, 235, 0.6); }

        .giant-ball {
            width: 90px; height: 90px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #60a5fa, #1d4ed8); display: inline-flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: bold; margin-top: 10px;
        }

        .feed-list { height: 220px; overflow-y: auto; background: #0f172a; padding: 10px; border-radius: 6px; font-size: 0.85rem; }
        .winner-alert { background: #14532d; color: #86efac; padding: 10px; border-radius: 6px; margin-bottom: 8px; border-left: 4px solid var(--success); }
    </style>
</head>
<body>

    <div class="header">
        <h1>🎮 Bingo TikTok Live - Panel Host</h1>
    </div>

    <div class="grid-container">
        <div class="panel">
            <h2>⚙️ Modos de Victoria Activos</h2>
            <div class="checkbox-group">
                <label><input type="checkbox" class="win-mode-cb" value="line" checked> Línea (Horiz / Vert)</label>
                <label><input type="checkbox" class="win-mode-cb" value="diagonal" checked> Diagonal</label>
                <label><input type="checkbox" class="win-mode-cb" value="corners" checked> 4 Esquinas</label>
                <label><input type="checkbox" class="win-mode-cb" value="full" checked> Cartón Lleno (Blackout)</label>
            </div>
            <button class="btn btn-primary" onclick="updateWinModes()">Aplicar Modos</button>

            <h2 style="margin-top: 25px;">🎵 TikTok Live</h2>
            <input type="text" id="tiktokUser" placeholder="@usuario_tiktok">
            <button class="btn btn-success" onclick="connectTikTok()">Conectar TikTok</button>
            <div id="tiktokStatus" style="margin-top: 8px; font-size: 0.85rem;">Estado: Desconectado</div>

            <h2 style="margin-top: 25px;">🔄 Controles</h2>
            <button class="btn btn-danger" onclick="resetGame()">Reiniciar Partida</button>
        </div>

        <div class="panel">
            <h2>🎱 Control de Balotas</h2>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="numInput" min="1" max="75" placeholder="Número (1-75)">
                <button class="btn btn-primary" style="margin: 0; width: auto;" onclick="drawManualNumber()">Cantar</button>
                <button class="btn btn-success" style="margin: 0; width: auto;" onclick="drawRandomNumber()">Aleatorio</button>
            </div>

            <div style="text-align: center; margin: 20px 0;">
                <div>Última Balota Cantada:</div>
                <div class="giant-ball" id="giantBall">--</div>
            </div>

            <h2>📋 Tablero General</h2>
            <div class="board-grid" id="boardGrid"></div>
        </div>

        <div class="panel">
            <h2>🏆 Ganadores Recientes</h2>
            <div class="feed-list" id="winnersList"></div>

            <h2 style="margin-top: 20px;">👥 Jugadores (<span id="playerCount">0</span>)</h2>
            <div class="feed-list" id="playersList"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        const boardGrid = document.getElementById('boardGrid');
        for (let i = 1; i <= 75; i++) {
            const cell = document.createElement('div');
            cell.className = 'ball-cell';
            cell.id = `ball-${i}`;
            cell.innerText = i;
            boardGrid.appendChild(cell);
        }

        socket.on('gameStateUpdate', (state) => {
            updateBoard(state.drawnNumbers);
            updateWinModesUI(state.winModes);
        });

        socket.on('numberDrawn', ({ number, drawnNumbers }) => {
            document.getElementById('giantBall').innerText = number;
            updateBoard(drawnNumbers);
        });

        socket.on('winModesUpdated', (modes) => { updateWinModesUI(modes); });

        socket.on('bingoWinner', ({ username, cardIndex, patterns }) => {
            const winnersList = document.getElementById('winnersList');
            const alert = document.createElement('div');
            alert.className = 'winner-alert';
            alert.innerHTML = `<strong>¡BINGO! 🎉</strong><br>${username} (Cartón #${cardIndex + 1})<br><small>Patrón: ${patterns.join(', ')}</small>`;
            winnersList.prepend(alert);
        });

        socket.on('playersUpdated', (players) => {
            document.getElementById('playerCount').innerText = players.length;
            document.getElementById('playersList').innerHTML = players.map(p => `<div style="padding: 4px 0;">👤 ${p.username} (${p.cards.length} cartones)</div>`).join('');
        });

        socket.on('gameReset', () => {
            document.getElementById('giantBall').innerText = '--';
            document.querySelectorAll('.ball-cell').forEach(c => c.classList.remove('drawn'));
            document.getElementById('winnersList').innerHTML = '';
        });

        function updateBoard(drawnNumbers) {
            document.querySelectorAll('.ball-cell').forEach(cell => {
                const num = parseInt(cell.innerText);
                if (drawnNumbers.includes(num)) cell.classList.add('drawn');
                else cell.classList.remove('drawn');
            });
        }

        function updateWinModesUI(modes) {
            document.querySelectorAll('.win-mode-cb').forEach(cb => { cb.checked = modes.includes(cb.value); });
        }

        function updateWinModes() {
            const activeModes = Array.from(document.querySelectorAll('.win-mode-cb:checked')).map(cb => cb.value);
            socket.emit('updateWinModes', activeModes);
            alert('Modos de victoria actualizados.');
        }

        function drawManualNumber() {
            const input = document.getElementById('numInput');
            const num = parseInt(input.value);
            if (num >= 1 && num <= 75) { socket.emit('drawNumber', num); input.value = ''; }
        }

        function drawRandomNumber() {
            const available = [];
            for (let i = 1; i <= 75; i++) {
                if (!document.getElementById(`ball-${i}`).classList.contains('drawn')) available.push(i);
            }
            if (available.length > 0) socket.emit('drawNumber', available[Math.floor(Math.random() * available.length)]);
        }

        function connectTikTok() {
            const user = document.getElementById('tiktokUser').value.trim();
            if (user) socket.emit('connectTikTok', user);
        }

        function resetGame() {
            if (confirm('¿Reiniciar la partida?')) socket.emit('resetGame');
        }
    </script>
</body>
</html>
