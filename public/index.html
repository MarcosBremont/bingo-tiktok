<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo TikTok - Panel Host</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #2563eb; --success: #16a34a; --danger: #dc2626; --text: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; }
        .grid-container { display: grid; grid-template-columns: 320px 1fr 300px; gap: 20px; }
        @media (max-width: 1024px) { .grid-container { grid-template-columns: 1fr; } }
        .panel { background: var(--card); padding: 20px; border-radius: 12px; }
        h2 { font-size: 1.1rem; color: #93c5fd; border-bottom: 2px solid #334155; padding-bottom: 8px; margin-bottom: 12px; }
        input, button { width: 100%; padding: 10px; margin-top: 8px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; }
        button { background: var(--accent); border: none; font-weight: bold; cursor: pointer; }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }
        .btn-warning { background: #d97706; }
        .checkbox-group label { display: flex; align-items: center; gap: 10px; background: #334155; padding: 8px; border-radius: 6px; margin-top: 6px; cursor: pointer; }
        .board-grid { display: grid; grid-template-columns: repeat(15, 1fr); gap: 4px; margin-top: 15px; }
        .ball-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #0f172a; border-radius: 4px; font-weight: bold; font-size: 0.8rem; }
        .ball-cell.drawn { background: var(--accent); box-shadow: 0 0 8px #60a5fa; }
        .giant-ball { width: 90px; height: 90px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #60a5fa, #1d4ed8); display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: bold; margin: 15px auto; }
        .feed { height: 200px; overflow-y: auto; background: #0f172a; padding: 10px; border-radius: 6px; font-size: 0.85rem; }
        .room-badge { background: #334155; color: #f59e0b; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 1.3rem; display: inline-block; margin-bottom: 10px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div style="text-align: center; margin-bottom: 15px;">
        <h1>🎮 Bingo Live - Panel Administrador</h1>
        <div class="room-badge" id="roomCodeBadge">SALA: ------</div>
    </div>

    <!-- MODAL AUTENTICACIÓN HOST -->
    <div id="authModal" style="position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 99;">
        <div style="background: var(--card); padding: 25px; border-radius: 12px; width: 320px; text-align: center;">
            <h2>🔒 Acceso Administrador</h2>
            <input type="password" id="hostPass" placeholder="Contraseña Maestra">
            <button onclick="loginHost()">Ingresar</button>
        </div>
    </div>

    <div class="grid-container">
        <div class="panel">
            <h2>🔑 Control de Sala</h2>
            <button class="btn-warning" onclick="newRoomCode()">🎲 Generar Nueva Sala</button>

            <h2 style="margin-top: 20px;">⚙️ Modos de Victoria</h2>
            <div class="checkbox-group">
                <label><input type="checkbox" class="win-cb" value="line" checked> Línea (Horiz / Vert)</label>
                <label><input type="checkbox" class="win-cb" value="diagonal" checked> Diagonal</label>
                <label><input type="checkbox" class="win-cb" value="corners" checked> 4 Esquinas</label>
                <label><input type="checkbox" class="win-cb" value="full" checked> Cartón Lleno</label>
            </div>
            <button onclick="saveWinModes()">Guardar Reglas</button>

            <h2 style="margin-top: 20px;">🎵 TikTok Live</h2>
            <input type="text" id="tiktokUser" placeholder="@usuario_tiktok">
            <button class="btn-success" onclick="connectTikTok()">Conectar TikTok</button>
            <div id="tiktokStatus" style="font-size: 0.8rem; margin-top: 6px; color: #94a3b8;">Estado: Desconectado</div>

            <h2 style="margin-top: 20px;">🔄 Controles</h2>
            <button class="btn-danger" onclick="resetGame()">Reiniciar Partida</button>
        </div>

        <div class="panel">
            <h2>🎱 Control de Balotas</h2>
            <button class="btn-success" style="font-size: 1.1rem; padding: 15px;" onclick="drawRandom()">🎲 Sacar Balota Aleatoria</button>

            <div style="text-align: center;">
                <div class="giant-ball" id="giantBall">--</div>
            </div>

            <h2>📋 Tablero General (75 Números)</h2>
            <div class="board-grid" id="boardGrid"></div>
        </div>

        <div class="panel">
            <h2>🏆 Ganadores</h2>
            <div class="feed" id="winnersList"></div>

            <h2 style="margin-top: 15px;">👥 Jugadores En Vivo (<span id="pCount">0</span>)</h2>
            <div class="feed" id="playersList"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentPassword = "";

        const boardGrid = document.getElementById('boardGrid');
        for (let i = 1; i <= 75; i++) {
            const cell = document.createElement('div');
            cell.className = 'ball-cell';
            cell.id = `ball-${i}`;
            cell.innerText = i;
            boardGrid.appendChild(cell);
        }

        function loginHost() {
            const pass = document.getElementById('hostPass').value;
            socket.emit('authHost', pass, (res) => {
                if (res.success) {
                    currentPassword = pass;
                    document.getElementById('authModal').style.display = 'none';
                    if (res.roomCode) {
                        document.getElementById('roomCodeBadge').innerText = `SALA: ${res.roomCode}`;
                    }
                } else {
                    alert(res.message);
                }
            });
        }

        socket.on('gameStateUpdate', (state) => {
            document.getElementById('roomCodeBadge').innerText = `SALA: ${state.roomCode}`;
            if (state.lastDrawnNumber) document.getElementById('giantBall').innerText = state.lastDrawnNumber;
            updateBoard(state.drawnNumbers);
        });

        socket.on('numberDrawn', ({ number, drawnNumbers }) => {
            document.getElementById('giantBall').innerText = number;
            updateBoard(drawnNumbers);
        });

        socket.on('bingoWinner', ({ username, cardIndex, patterns }) => {
            const feed = document.getElementById('winnersList');
            feed.innerHTML = `<div style="background:#14532d; padding:8px; border-radius:6px; margin-bottom:6px;">
                <strong>🎉 ¡BINGO! ${username}</strong><br><small>Cartón #${cardIndex + 1} (${patterns.join(', ')})</small>
            </div>` + feed.innerHTML;
        });

        socket.on('playersUpdated', (players) => {
            document.getElementById('pCount').innerText = players.length;
            document.getElementById('playersList').innerHTML = players.map(p => `<div>👤 ${p.username} (${p.cards.length} cartones)</div>`).join('');
        });

        socket.on('gameReset', () => {
            document.getElementById('giantBall').innerText = '--';
            document.querySelectorAll('.ball-cell').forEach(c => c.classList.remove('drawn'));
            document.getElementById('winnersList').innerHTML = '';
        });

        socket.on('tikTokStatus', ({ connected, username, error }) => {
            document.getElementById('tiktokStatus').innerText = connected ? `🟢 Conectado: @${username}` : `🔴 Error: ${error || 'Desconectado'}`;
        });

        function updateBoard(drawn) {
            document.querySelectorAll('.ball-cell').forEach(c => {
                if (drawn.includes(parseInt(c.innerText))) c.classList.add('drawn');
                else c.classList.remove('drawn');
            });
        }

        function drawRandom() {
            socket.emit('drawRandomNumber', { password: currentPassword });
        }

        function saveWinModes() {
            const modes = Array.from(document.querySelectorAll('.win-cb:checked')).map(cb => cb.value);
            socket.emit('updateWinModes', { password: currentPassword, modes });
            alert('Reglas guardadas.');
        }

        function connectTikTok() {
            const uniqueId = document.getElementById('tiktokUser').value.trim();
            socket.emit('connectTikTok', { password: currentPassword, uniqueId });
        }

        function newRoomCode() {
            if (confirm('¿Generar nuevo código de sala? Esto desconectará a los jugadores actuales.')) {
                socket.emit('regenerateRoomCode', { password: currentPassword }, (res) => {
                    if (res.success) {
                        document.getElementById('roomCodeBadge').innerText = `SALA: ${res.roomCode}`;
                    }
                });
            }
        }

        function resetGame() {
            if (confirm('¿Reiniciar el juego? Se generará un nuevo código de sala.')) {
                socket.emit('resetGame', { password: currentPassword });
            }
        }
    </script>
</body>
</html>
